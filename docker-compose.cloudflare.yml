services:
  cloudflared:
    # cloudflared 2026.7.1 linux/amd64 child manifest
    image: cloudflare/cloudflared:2026.7.1@sha256:b4d7b15b9e9256ee3c9d243a49cec440aa6d7acbf6b2e2c1086ebfff939ec48d
    platform: linux/amd64
    depends_on:
      gateway:
        condition: service_healthy
    command:
      - tunnel
      - run
      - --token-file
      - /run/secrets/cloudflare_tunnel_token
    secrets:
      - cloudflare_tunnel_token
    networks:
      - gateway-ingress
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=16m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 128m
    pids_limit: 64
    restart: unless-stopped

secrets:
  cloudflare_tunnel_token:
    file: ${CLOUDFLARE_TUNNEL_TOKEN_FILE:?set CLOUDFLARE_TUNNEL_TOKEN_FILE to a protected token file}

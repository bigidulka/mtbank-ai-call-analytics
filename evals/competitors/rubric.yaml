{
  "schema": "competitor-rubric/v1",
  "scoring": {
    "verified_maximum": 100,
    "bonus_maximum": 15,
    "comparative_score_policy": "A comparative score is null until every applicable criterion has attested absence or verified static evidence and the candidate has an immutable release SHA plus image evidence.",
    "unknown_policy": "unknown, out_of_scope and claim_only are not zeros and never add verified points. A missing archive is unknown, not absence."
  },
  "evidence_statuses": {
    "verified": "bounded static source evidence or an explicitly referenced attestation",
    "claim_only": "Any prose/docs claim (.md, .rst, .txt or docs/ path) without independent source/attestation",
    "unknown": "no safe source input or insufficient evidence",
    "absent": "only an attestation may establish absence for scoring completeness",
    "out_of_scope": "repository relevance is not established; it is not scored as zero"
  },
  "criteria": [
    {"id":"pipeline_entry","weight":8,"evidence":"A non-README source file defines or registers a pipeline/entry point.","partial":"0 or 8; one verified entry point is required."},
    {"id":"attachment_flow","weight":10,"evidence":"A non-README source file handles an attachment, upload, multipart input or file context.","partial":"0 or 10; static input-flow evidence is required."},
    {"id":"asr","weight":10,"evidence":"A non-README source file invokes or configures ASR/transcription.","partial":"0 or 10; a recognizer/client reference is required."},
    {"id":"diarization_roles","weight":10,"evidence":"Independent non-README evidence for diarization and for speaker/role resolution.","partial":"5 for either signal; 10 for both."},
    {"id":"llm_tool_trajectories","weight":10,"evidence":"Independent non-README evidence for an LLM/agent call site and declared tool/function trajectory.","partial":"5 for either signal; 10 for both."},
    {"id":"api_compose","weight":10,"evidence":"Independent non-README evidence for an API surface and Compose/container orchestration.","partial":"5 for either signal; 10 for both."},
    {"id":"security_privacy","weight":12,"evidence":"Independent non-README controls for secrets/egress and privacy/redaction.","partial":"6 for either signal; 12 for both."},
    {"id":"persistence","weight":8,"evidence":"A non-README source file configures or uses a database/persistent store.","partial":"0 or 8; a concrete store/configuration reference is required."},
    {"id":"observability","weight":8,"evidence":"A non-README source file emits metrics/traces/structured observability.","partial":"0 or 8; a concrete instrumentation reference is required."},
    {"id":"tests","weight":8,"evidence":"A test source file contains executable test definitions; it is not run by this benchmark.","partial":"0 or 8; static test definition required."},
    {"id":"documentation","weight":6,"evidence":"Static prose/docs is claim_only; this scanner grants no documentation points without an independent attestation.","partial":"0 static points; independent attestation required."}
  ],
  "bonuses": [
    {"id":"evaluation_artifacts","weight":5,"evidence":"Static, versioned evaluation fixtures or result schema outside README.","partial":"0 or 5."},
    {"id":"resilience_controls","weight":5,"evidence":"Static timeout/retry/fail-closed control outside README.","partial":"0 or 5."},
    {"id":"release_evidence","weight":5,"evidence":"Attested immutable image/release evidence.","partial":"0 or 5; source presence alone is insufficient."}
  ]
}

name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  offline:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
      - name: Install locked tooling
        run: python -m pip install --disable-pip-version-check uv==0.11.16
      - name: Verify root and speech locks
        run: |
          uv lock --check
          uv lock --check --directory services/speech
          test -f services/speech/uv.lock
      - name: Install root development environment
        run: uv sync --frozen --all-groups
      - name: Lint and type-check
        run: |
          uv run ruff check .
          uv run ruff format --check .
          uv run pyright
      - name: Run offline unit and contract tests
        run: uv run pytest -m "not integration and not real_llm and not gpu"
      - name: Run deterministic release static scans
        run: |
          uv run python scripts/check_release_static.py secrets
          uv run python scripts/check_release_static.py locks
      - name: Validate workflow YAML syntax
        run: ruby -ryaml -e 'ARGV.each { |path| YAML.load_file(path) }' .github/workflows/*.yml
      - name: Generate SBOM and license inventory only when syft is preinstalled
        run: |
          if command -v syft >/dev/null 2>&1; then
            mkdir -p artifacts
            syft dir:. -o cyclonedx-json=artifacts/sbom.cdx.json
          fi

  migration-disposable-postgres:
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres@sha256:16bc17c64a573ef34162af9298258d1aec548232985b33ed7b1eac33ba35c229
        env:
          POSTGRES_DB: mtbank_test_ci
          POSTGRES_USER: mtbank_test
          POSTGRES_PASSWORD: ci-disposable-only
        options: >-
          --health-cmd "pg_isready -U mtbank_test -d mtbank_test_ci"
          --health-interval 5s --health-timeout 5s --health-retries 12
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
      - run: python -m pip install --disable-pip-version-check uv==0.11.16
      - run: uv sync --frozen --all-groups
      - name: Run destructive migration suite against disposable database
        env:
          MTBANK_ALLOW_DESTRUCTIVE_DB_TESTS: "1"
          MTBANK_TEST_DATABASE_URL: postgresql+asyncpg://mtbank_test:ci-disposable-only@localhost:5432/mtbank_test_ci
        run: uv run pytest tests/integration/test_postgres_migrations.py

  canonical-app-image:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Build canonical application image from frozen dependencies
        run: docker build -f docker/app.Dockerfile -t mtbank-ai-foundation:ci .

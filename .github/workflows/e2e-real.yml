name: Real E2E evidence

on:
  schedule:
    - cron: "23 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  real-cloud-gateway:
    runs-on: ubuntu-24.04
    env:
      MTBANK_RELEASE_GATE: "1"
      MTBANK_AGENT_RUNTIME__GATEWAY__BASE_URL: ${{ secrets.MTBANK_AGENT_RUNTIME__GATEWAY__BASE_URL }}
      MTBANK_AGENT_RUNTIME__GATEWAY__API_KEY: ${{ secrets.MTBANK_AGENT_RUNTIME__GATEWAY__API_KEY }}
      MTBANK_AGENT_RUNTIME__GATEWAY__MODELS__DEFAULT_MODEL: ${{ secrets.MTBANK_AGENT_RUNTIME__GATEWAY__MODELS__DEFAULT_MODEL }}
      MTBANK_REAL_E2E_API_BASE_URL: ${{ secrets.MTBANK_REAL_E2E_API_BASE_URL }}
      MTBANK_REAL_E2E_ATTESTATION_URL: ${{ secrets.MTBANK_REAL_E2E_ATTESTATION_URL }}
      MTBANK_RELEASE_CODE_SHA: ${{ github.sha }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
      - run: python -m pip install --disable-pip-version-check uv==0.11.16
      - run: uv sync --frozen --all-groups
      - name: Refuse a release run without real cloud configuration
        run: uv run pytest -m real_llm
      - name: Collect nonce-bound live attestation and produce sanitized evidence
        env:
          CODE_SHA: ${{ github.sha }}
        run: |
          test -n "$MTBANK_REAL_E2E_ATTESTATION_URL"
          uv run python scripts/release_real_e2e.py \
            --attestation-url "$MTBANK_REAL_E2E_ATTESTATION_URL" \
            --evidence release-evidence/real-agent-traces.json \
            --code-sha "$CODE_SHA"
      - uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: real-e2e-sanitized-evidence
          path: release-evidence/real-agent-traces.json
          if-no-files-found: error

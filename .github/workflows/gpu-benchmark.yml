name: GPU benchmark evidence

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gpu-benchmark:
    runs-on: [self-hosted, linux, gpu]
    env:
      MTBANK_RELEASE_GATE: "1"
      MTBANK_GPU_BENCHMARK_EVIDENCE: release-evidence/gpu-benchmark.json
      MTBANK_API_KEY: ${{ secrets.MTBANK_GPU_BENCHMARK_API_KEY }}
      MTBANK_GPU_BENCHMARK_WEBSOCKET_URL: ${{ vars.MTBANK_GPU_BENCHMARK_WEBSOCKET_URL }}
      MTBANK_GPU_BENCHMARK_ORIGIN: ${{ vars.MTBANK_GPU_BENCHMARK_ORIGIN }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
      - run: python -m pip install --disable-pip-version-check uv==0.11.16
      - run: uv sync --frozen --all-groups
      - name: Require controlled WebSocket benchmark configuration
        run: |
          test -n "$MTBANK_API_KEY"
          test -n "$MTBANK_GPU_BENCHMARK_WEBSOCKET_URL"
          test -n "$MTBANK_GPU_BENCHMARK_ORIGIN"
      - name: Run observed NVIDIA WebSocket workload
        run: |
          image_digest="$(docker image inspect --format '{{.Id}}' mtbank-ai-speech-gpu:local)"
          uv run python scripts/run_gpu_speech_benchmark.py \
            --websocket-url "$MTBANK_GPU_BENCHMARK_WEBSOCKET_URL" \
            --origin "$MTBANK_GPU_BENCHMARK_ORIGIN" \
            --audio test_data/synthetic/credit-consultation-16k.wav \
            --image-digest "$image_digest" \
            --workload-revision websocket-pcm16-v1 \
            --output-dir release-evidence
      - name: Validate generated GPU evidence for this checkout
        run: |
          uv run python -c "import json, subprocess; from pathlib import Path; from mtbank_ai.release.evidence import validate_evidence; sha = subprocess.check_output(('git', 'rev-parse', 'HEAD'), text=True).strip(); validate_evidence(json.loads(Path('release-evidence/gpu-benchmark.json').read_text()), expected_kind='gpu-benchmark', expected_code_sha=sha); validate_evidence(json.loads(Path('release-evidence/websocket-gpu-p95.json').read_text()), expected_kind='websocket-gpu-p95', expected_code_sha=sha)"
      - name: Require generated GPU evidence in the release test marker
        run: uv run pytest -m gpu
      - name: Report all release gates without treating absent non-GPU proof as pass
        run: uv run python scripts/check_release_gate.py --allow-blocked --output release-evidence/release-gate.json
      - uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: gpu-release-evidence
          path: release-evidence/
          if-no-files-found: error
